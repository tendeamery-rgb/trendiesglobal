<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="robots" content="noindex,nofollow"/>
  <title>Unsubscribe | Trendies Global</title>
  <link href="/favicon.svg" rel="icon" sizes="any" type="image/svg+xml"/>
  <link href="/styles.css" rel="stylesheet"/>
  <style>
    body{min-height:100vh;display:grid;place-items:center;padding:18px}
    .unsub{width:min(720px,100%);padding:clamp(24px,5vw,46px)}
    .unsub h1{font-family:Georgia,serif;font-size:clamp(2.8rem,10vw,5.4rem);line-height:.88;margin:0 0 18px}
    .unsub p{font-size:1.08rem;line-height:1.6}
  </style>
</head>
<body>
  <main class="card unsub">
    <p class="kicker">Email settings</p>
    <h1>You can come back anytime.</h1>
    <p id="message">Updating your email settings...</p>
    <div class="welcome-actions">
      <a class="button primary" href="/">Back to Trendies</a>
      <a class="button secondary" id="prefs" href="/preferences">Change preferences</a>
    </div>
  </main>
  <script>
    const token = new URLSearchParams(location.search).get("token") || "";
    const message = document.querySelector("#message");
    document.querySelector("#prefs").href = "/preferences?token=" + encodeURIComponent(token);
    async function unsubscribe(){
      if(!token){ message.textContent = "Missing unsubscribe token."; return; }
      try{
        const res = await fetch("/api/unsubscribe?token=" + encodeURIComponent(token), {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({token})});
        const data = await res.json();
        if(!data.ok) throw new Error(data.error || "Could not unsubscribe.");
        message.textContent = "You are unsubscribed from Trendies email updates. The door is still open if you want to come back later.";
      }catch(error){
        message.textContent = error.message;
      }
    }
    unsubscribe();
  </script>
</body>
</html>
